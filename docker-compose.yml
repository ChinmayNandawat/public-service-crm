services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: civiccrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKET: smart-crm-uploads
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9000"

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5433/civiccrm
      JWT_SECRET: Zh3Z/OtwxaD8mINC6Gn6Ma5eJlmFtTUqPADPTnUKTEQ=
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://localhost:5002
      AI_SERVICE_API_KEY: your-ai-service-key
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      EMAIL_FROM: noreply@smartcrm.com
      AWS_ACCESS_KEY: your-aws-access-key
      AWS_SECRET_KEY: your-aws-secret-key
      AWS_REGION: us-east-1
      AWS_BUCKET: smart-crm-uploads
      # For local development, use MinIO instead of S3
      AWS_S3_ENDPOINT: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL to be ready...' &&
        while ! nc -z postgres 5432; do
          echo 'PostgreSQL not ready, sleeping...'
          sleep 2
        done &&
        echo 'PostgreSQL is ready!' &&
        npm run dev
      "

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001
    volumes:
      - ./frontend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
